<!DOCTYPE html>
<html lang="en">
<head>
    <title>CryptoGraphy Algorithm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid d-flex justify-content-between text-bg-primary bg-gradient py-3">
        <p></p>
        <h1>CryptoGraphy Algorithm</h1>
        <button class="btn btn-outline-light">Dark</button>
    </div>
    <div class="container mt-3">
        <form method="POST" class="form-control shadow-lg">
            <label for="algorithm" class="fw-bold">Select any type of Cryptography Algorithm:</label>
            <select class="form-select mb-3" id="algorithm" name="algorithmType" required>
                <option value="" disabled selected>Select an algorithm</option>
                <option value="caesar">Caesar Cipher</option>
                <option value="vigenere">Vigenère Cipher</option>
                <option value="railfence">Railfence Cipher</option>
                <option value="playfair">Playfair Cipher</option>
                <option value="hill">Hill Cipher</option>
            </select>
            <label for="type" class="fw-bold">Select the type of operation:</label>
            <select class="form-select mb-3" id="type" name="operationType" required>
                <option value="" disabled selected>Select an operation</option>
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>
            <label for="text" class="fw-bold">Enter the text to encrypt/decrypt:</label>
            <textarea class="form-control mb-3" id="text" name="text" rows="3" required></textarea>
            <label for="key" class="fw-bold">Enter the key:</label>
            <input type="text" class="form-control mb-3" id="key" name="key" required>
            <input type="submit" value="Submit" class="btn btn-primary">
        </form>
    </div>
    <div class="container my-5 shadow-lg rounded-3 p-3">
        <div class="row justify-content-between g-5">
            <h2 class="text-center shadow-lg py-2 bg-primary bg-gradient rounded-2 text-light">{{algorithm}} Cipher</h2>
            <div class="col-md-5 mx-5 shadow-lg rounded-3 border">
                <h2 class="text-center shadow-lg py-2 bg-primary bg-gradient rounded-2 text-light">Input Text</h2>
                <label class="fw-bold">Text:</label><br>
                <p>{{input_text}}</p>
                <label class="fw-bold">Key:</label>
                <p>{{key}}</p>
            </div>
            <div class="col-md-5 mx-5 shadow-lg rounded-3 border">
                <h2 class="text-center shadow-lg py-2 bg-primary bg-gradient rounded-2 text-light">Output Text</h2>
                <label class="fw-bold">Text:</label><br>
                <p>{{output_text}}</p>
                <label class="fw-bold">Key:</label>
                <p>{{key}}</p>
            </div>
        </div>
    </div>
    <div class="container my-4 shadow-lg rounded-3 p-3">
        <h2 class="text-center shadow-lg py-2 bg-primary bg-gradient rounded-2 text-light">Algorithm</h2>
        <ul class="list-group">

        {% for step in steps %}
        <li class="list-group-item">
            {{ step }}
        </li>
        {% endfor %}

    </ul>
    </div>
    <footer class="bg-secondary text-center p-2 text-light mt-3">
        <P>&copy;Cryptography Algorithm</P>
    </footer>
    <script>
        document.querySelector('.btn-outline-light').addEventListener('click',function(){
            const theme=document.querySelector('.btn-outline-light');
            if(theme.textContent==="Light"){
                theme.textContent="Dark";
                document.body.style.backgroundColor="white";
                document.body.style.color="black";
            }else{
                theme.textContent="Light";
                document.body.style.backgroundColor="grey";
                document.body.style.color="white";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
